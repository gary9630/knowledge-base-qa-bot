x-production-image: &production-image
  image: ${KB_IMAGE:?Set KB_IMAGE to the production image tag}
  pull_policy: always

x-production-env-file: &production-env-file
  - ${KB_PRODUCTION_ENV_FILE:-/etc/kb/production.env}

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: ${KB_POSTGRES_PASSWORD:?Set KB_POSTGRES_PASSWORD}
      POSTGRES_DB: kb
    ports:
      - "${KB_POSTGRES_PORT:-127.0.0.1:5432}:5432"

  migrate:
    <<: *production-image
    env_file: *production-env-file
    environment:
      KB_DATABASE_URL: ${KB_DATABASE_URL:?Set KB_DATABASE_URL}

  app:
    <<: *production-image
    restart: unless-stopped
    env_file: *production-env-file
    environment:
      KB_DATABASE_URL: ${KB_DATABASE_URL:?Set KB_DATABASE_URL}
    ports:
      - "${KB_APP_PORT:-127.0.0.1:8000}:8000"

  worker:
    <<: *production-image
    env_file: *production-env-file
    environment:
      KB_DATABASE_URL: ${KB_DATABASE_URL:?Set KB_DATABASE_URL}

  eval-runner:
    <<: *production-image
    env_file: *production-env-file
    environment:
      KB_DATABASE_URL: ${KB_DATABASE_URL:?Set KB_DATABASE_URL}
