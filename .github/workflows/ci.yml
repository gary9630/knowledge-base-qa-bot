name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --python 3.12 --group dev

      - name: Lint and typecheck
        run: make lint

      - name: Local tests
        run: make test

      - name: Validate deploy environment contract
        run: make deploy-check-ci

      - name: Validate Docker Compose config
        run: docker compose --profile worker --profile test config

      - name: Docker-backed tests
        run: make docker-test

      - name: Docker app and worker smoke
        run: make docker-smoke

      - name: Docker cleanup
        if: always()
        run: make docker-down
